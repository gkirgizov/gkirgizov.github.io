{%- assign p = site.data.profile -%}
<header class="nav" data-nav>
  <div class="nav__inner">
    <a class="nav__brand" href="#top" aria-label="{{ p.name }} — back to top">
      <span class="nav__mark" aria-hidden="true">{{ p.monogram }}</span>
      <span class="nav__name">{{ p.name }}</span>
    </a>

    <nav class="nav__links" aria-label="Primary">
      <a href="#about" data-spy="about">About</a>
      <a href="#cv" data-spy="cv">CV</a>
      <a href="#projects" data-spy="projects">Projects</a>
    </nav>

    <div class="nav__actions">
      <a class="btn btn--ghost btn--sm nav__cv" href="{{ p.contact.cv | relative_url }}" download>
        CV <span aria-hidden="true">↓</span>
      </a>
      <button class="theme-toggle" type="button" aria-label="Toggle colour theme" data-theme-toggle>
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4.2"></circle>
          <path d="M12 2v2.4M12 19.6V22M2 12h2.4M19.6 12H22M4.6 4.6l1.7 1.7M17.7 17.7l1.7 1.7M19.4 4.6l-1.7 1.7M6.3 17.7l-1.7 1.7"></path>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 14.5A8 8 0 0 1 9.5 4a6.5 6.5 0 1 0 10.5 10.5z"></path>
        </svg>
      </button>
    </div>
  </div>
</header>
