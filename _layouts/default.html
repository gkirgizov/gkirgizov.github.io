<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#13110f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f1ebe1" media="(prefers-color-scheme: light)">

  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">

  <link rel="stylesheet" href="{{ '/assets/css/tokens.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">

  {% seo %}

  <script>
    // Run before first paint: pin the theme (no palette flash) and mark JS on
    // (so reveal-on-scroll elements start hidden only when JS can reveal them).
    (function () {
      var d = document.documentElement;
      d.dataset.theme =
        localStorage.theme ||
        (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      d.classList.add('js');
    })();
  </script>
</head>
<body>
  {% include nav.html %}

  <main id="top">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
</body>
</html>
