<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">

  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">

  <link rel="stylesheet" href="{{ '/assets/css/cv.css' | relative_url }}?v={{ site.time | date: '%s' }}">

  {% comment %} Keep the printable CV out of search results — it duplicates the
  homepage CV section; the homepage is the canonical indexed page. {% endcomment %}
  <meta name="robots" content="noindex, follow">
</head>
<body>
  <!-- Screen-only controls; hidden when printing. -->
  <div class="toolbar" role="toolbar" aria-label="CV actions">
    <a class="toolbar__back" href="{{ '/' | relative_url }}">← Back to site</a>
    <button class="toolbar__print" type="button" onclick="window.print()">
      Print / Save as PDF
    </button>
  </div>

  <main class="sheet">
    {{ content }}
  </main>
</body>
</html>
