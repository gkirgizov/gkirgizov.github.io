# Unified timeline — experience, art & education — reverse chronological.
# `kind` drives the category chip + accent colour (research / engineering / art / education).
timeline:
  - kind: research
    period: 2024 — Present
    org: Noeon Research
    sub: Reasoning-AI startup · Tokyo
    role: Senior Research Engineer
    summary: >-
      High-quality R&amp;D across the company's core projects — in close
      collaboration with researchers and engineers — at a startup building
      next-gen reasoning AI from category theory, logical solvers, and agentic
      methods.
    highlights:
      - Designed and built a bidirectional bridge between the in-house formal DSL and SMT-solver languages — including formal translation of a coroutine-like language — foundational for the system's reasoning.
      - Ran R&amp;D on solver coverage and speed, logical-representation trade-offs, and a subsystem for complex Sudoku solving.
      - Authored research reports and algorithm design for an ARC-AGI pipeline; built data-generation and benchmarking for the subgraph-matching algorithm.
    tech: [Python, Rust, SMT Solvers, First-order Logic, Category Theory, Graph Theory, LLM Agents]
    links:
      - { label: "noeon.ai", url: "https://noeon.ai/" }

