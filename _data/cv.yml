    org: ITMO University
    sub: AI in Industry Lab · Saint Petersburg
    role: AI Research Engineer
    summary: >-
      Leading development of GOLEM — an AI framework for graph optimization with
      metaheuristic methods (genetic, swarm). Driving architecture, research
      direction, and a small research team.
    highlights:
      - Led a full architectural redesign of the lab's primary project and its integrations with other teams' tools.
      - Launched GOLEM, a new framework for graph optimization, and initiated a research direction on adaptive evolution with reinforcement learning.
      - Contributed to 3 research papers (in progress); supervised interns and MSc students; taught classes on architecture and graph optimization.
    tech: [Python, PyTorch, Evolutionary Algorithms, Reinforcement Learning, AutoML, Graph Theory, Time-Series]
    links:
      - { label: "@aimclub", url: "https://github.com/aimclub/" }

